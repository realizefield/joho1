// =================================================================
// 状態管理
// =================================================================
const state = {
  currentPage: 1,
  fillSelectedChip: {},  // unitId -> chip element
  startTime: Date.now()
};

// =================================================================
// ふりがな変換 {漢字|よみ} -> <ruby>漢字<rt>よみ</rt></ruby>
// =================================================================
function convertFurigana(text) {
  if (!text) return '';
  return text.replace(/\{([^|}]+)\|([^}]+)\}/g, '<ruby>$1<rt>$2</rt></ruby>');
}

// =================================================================
// 用語解説の埋め込み(本文中の<span class="term">に既に書かれている前提でhandled by clickイベント)
// =================================================================
function bindTermPopups(scope, terms) {
  if (!terms) return;
  scope.querySelectorAll('.term').forEach(el => {
    const key = el.getAttribute('data-term');
    if (!key || !terms[key]) return;
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      showTermPopup(el, terms[key]);
    });
    el.addEventListener('mouseenter', (e) => {
      showTermPopup(el, terms[key]);
    });
    el.addEventListener('mouseleave', (e) => {
      const popup = document.getElementById('termPopup');
      // モバイルではタップ専用にしたいので、ホバー離脱では消さない選択もある
      // ここでは離脱で消す
      popup.classList.remove('show');
    });
  });
}

function showTermPopup(el, term) {
  const popup = document.getElementById('termPopup');
  popup.innerHTML = `
    <div><strong>${escapeHtml(el.textContent)}</strong></div>
    <div class="en">英語:${escapeHtml(term.en || '')}</div>
    <div class="kana">カタカナ:${escapeHtml(term.kana || '')}</div>
    <div class="origin">由来:${escapeHtml(term.origin || '')}</div>
  `;
  const rect = el.getBoundingClientRect();
  popup.style.left = (window.scrollX + rect.left) + 'px';
  popup.style.top = (window.scrollY + rect.bottom + 6) + 'px';
  // 画面右にはみ出すなら調整
  popup.classList.add('show');
  const popupRect = popup.getBoundingClientRect();
  if (popupRect.right > window.innerWidth - 10) {
    popup.style.left = (window.scrollX + window.innerWidth - popupRect.width - 10) + 'px';
  }
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.term') && !e.target.closest('.term-popup')) {
    document.getElementById('termPopup').classList.remove('show');
  }
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// <br>のみ許容するエスケープ(選択肢内で改行を表現したいとき用)
function escapeHtmlAllowBr(s) {
  return escapeHtml(s).replace(/&lt;br\s*\/?&gt;/gi, '<br>');
}

// =================================================================
// 単元カードのレンダリング
// =================================================================
function renderUnits() {
  const container = document.getElementById('unitsContainer');
  container.innerHTML = '';

  units.filter(u => u.page === state.currentPage).forEach(unit => {
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.id = unit.id;
    card.innerHTML = `
      <div class="unit-header">
        <div class="unit-no">単元${unit.id.replace('u','')}</div>
        <div class="unit-title">${escapeHtml(unit.title.replace(/^\d+\.\s*/, ''))}</div>
      </div>
      <div class="unit-body">
        <div class="unit-explain">${convertFurigana(unit.body)}</div>

        <div class="mode-tabs" data-unit="${unit.id}">
          <button class="mode-tab active" data-mode="fill">✏️ 穴埋め</button>
          <button class="mode-tab" data-mode="choice4">🎯 4択</button>
          <button class="mode-tab" data-mode="ox">⭕❌ 〇×</button>
          <button class="mode-tab" data-mode="confirm">📝 確認</button>
          <button class="mode-tab" data-mode="challenge">🏆 チャレンジ</button>
          ${(unit.practice && unit.practice.length) ? `<button class="mode-tab" data-mode="practice">📚 練習</button>` : ''}
          ${(unit.exercise && unit.exercise.length) ? `<button class="mode-tab" data-mode="exercise">💪 演習</button>` : ''}
        </div>

        <div class="mode-content active" data-mode="fill" data-unit="${unit.id}">
          ${renderFill(unit)}
        </div>
        <div class="mode-content" data-mode="choice4" data-unit="${unit.id}">
          ${renderChoice4(unit)}
        </div>
        <div class="mode-content" data-mode="ox" data-unit="${unit.id}">
          ${renderOx(unit)}
        </div>
        <div class="mode-content" data-mode="confirm" data-unit="${unit.id}">
          ${renderConfirm(unit)}
        </div>
        ${(unit.practice && unit.practice.length) ? `
        <div class="mode-content" data-mode="practice" data-unit="${unit.id}">
          ${renderPracticeOrExercise(unit, 'practice')}
        </div>` : ''}
        ${(unit.exercise && unit.exercise.length) ? `
        <div class="mode-content" data-mode="exercise" data-unit="${unit.id}">
          ${renderPracticeOrExercise(unit, 'exercise')}
        </div>` : ''}
      </div>
    `;
    container.appendChild(card);

    // 用語ポップアップを本文に紐付け
    bindTermPopups(card.querySelector('.unit-explain'), unit.terms);

    // 穴埋めのドラッグ&ドロップ初期化
    initFill(card, unit);
    // 初期表示は「お手本」状態(語句が入った状態で読めるように)
    fillInitialAnswers(card, unit);
    // 4択イベント
    initChoice(card, unit, 'choice4');
    // 〇×
    initOx(card, unit);
    // 確認
    initChoice(card, unit, 'confirm');
    // 練習
    if (unit.practice && unit.practice.length) initPracticeOrExercise(card, unit, 'practice');
    // 演習
    if (unit.exercise && unit.exercise.length) initPracticeOrExercise(card, unit, 'exercise');
    // モードタブ切替
    initModeTabs(card);
    // ベスト記録表示
    updateBestRecords(unit.id);
  });
}

// =================================================================
// 穴埋め:本文の【1】【2】... をドロップ枠に変換
// =================================================================
function renderFill(unit) {
  const fill = unit.fill;
  // 【n】を <span class="dz" data-idx="n-1"></span> に置換
  let text = escapeHtml(fill.text);
  text = text.replace(/【(\d+)】/g, (_, n) => {
    const idx = parseInt(n) - 1;
    return `<span class="dz" data-idx="${idx}" data-unit="${unit.id}"></span>`;
  });
  // 改行 -> <br>
  text = text.replace(/\n/g, '<br>');

  // 語句バンク
  const bankHtml = fill.bank.map((w, i) =>
    `<span class="word-chip" draggable="true" data-word="${escapeHtml(w)}" data-bank-idx="${i}">${escapeHtml(w)}</span>`
  ).join('');

  return `
    <div class="fill-hint" id="fill-hint-${unit.id}" style="font-size:0.85em; color:#6B7280; margin-bottom:6px;">📖 お手本表示中です。「自分で挑戦」を押すと、語句を外して練習できます。</div>
    <div class="fill-area" data-unit="${unit.id}">${text}</div>
    <div class="word-bank" data-unit="${unit.id}">${bankHtml}</div>
    <div class="best-records" id="best-${unit.id}"></div>
    <div class="btn-row">
      <button class="btn btn-amber" onclick="resetFill('${unit.id}')">🎯 自分で挑戦</button>
      <button class="btn btn-primary" onclick="checkFill('${unit.id}')">✅ 答え合わせ</button>
      <button class="btn btn-secondary" onclick="showFillAnswer('${unit.id}')">💡 お手本に戻す</button>
    </div>
    <div class="result" id="result-${unit.id}"></div>
  `;
}

function initFill(card, unit) {
  const fillArea = card.querySelector(`.fill-area[data-unit="${unit.id}"]`);
  const bank = card.querySelector(`.word-bank[data-unit="${unit.id}"]`);

  // チップ:ドラッグ + クリックで「選択」モード(モバイル対応)
  bank.querySelectorAll('.word-chip').forEach(chip => {
    chip.addEventListener('dragstart', (e) => {
      if (chip.classList.contains('used')) { e.preventDefault(); return; }
      chip.classList.add('dragging');
      e.dataTransfer.setData('text/plain', chip.dataset.word);
      e.dataTransfer.setData('bank-idx', chip.dataset.bankIdx);
    });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
    chip.addEventListener('click', () => {
      if (chip.classList.contains('used')) return;
      // 選択をトグル
      bank.querySelectorAll('.word-chip.selected').forEach(c => {
        if (c !== chip) c.classList.remove('selected');
        c.style.boxShadow = '';
      });
      const isSel = chip.classList.toggle('selected');
      chip.style.boxShadow = isSel ? '0 0 0 3px var(--accent-amber)' : '';
      state.fillSelectedChip[unit.id] = isSel ? chip : null;
    });
  });

  // ドロップゾーン
  fillArea.querySelectorAll('.dz').forEach(dz => {
    dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.background = 'var(--primary-light)'; });
    dz.addEventListener('dragleave', () => { dz.style.background = ''; });
    dz.addEventListener('drop', (e) => {
      e.preventDefault();
      dz.style.background = '';
      const word = e.dataTransfer.getData('text/plain');
      const bankIdx = e.dataTransfer.getData('bank-idx');
      placeWordInDz(unit.id, dz, word, bankIdx);
    });
    // クリックで「選択中」のチップを配置(モバイル)
    dz.addEventListener('click', () => {
      const sel = state.fillSelectedChip[unit.id];
      if (sel && !sel.classList.contains('used')) {
        placeWordInDz(unit.id, dz, sel.dataset.word, sel.dataset.bankIdx);
        sel.classList.remove('selected');
        sel.style.boxShadow = '';
        state.fillSelectedChip[unit.id] = null;
      } else if (dz.classList.contains('has-word')) {
        // 既に置いてある場合、もう一度クリックすると外す
        returnDz(unit.id, dz);
      }
    });
  });
}

function placeWordInDz(unitId, dz, word, bankIdx) {
  // 既にdzに置いていた場合は元のチップを戻す
  if (dz.dataset.bankIdx !== undefined && dz.dataset.bankIdx !== '') {
    returnDz(unitId, dz);
  }
  dz.textContent = word;
  dz.classList.add('has-word');
  dz.classList.remove('correct', 'wrong');
  dz.dataset.bankIdx = bankIdx;
  // チップを使用済みに
  const card = document.getElementById(unitId);
  const chip = card.querySelector(`.word-chip[data-bank-idx="${bankIdx}"]`);
  if (chip) chip.classList.add('used');
}

function returnDz(unitId, dz) {
  const card = document.getElementById(unitId);
  const oldIdx = dz.dataset.bankIdx;
  if (oldIdx !== undefined && oldIdx !== '') {
    const chip = card.querySelector(`.word-chip[data-bank-idx="${oldIdx}"]`);
    if (chip) chip.classList.remove('used');
  }
  dz.textContent = '';
  dz.classList.remove('has-word', 'correct', 'wrong');
  dz.dataset.bankIdx = '';
}

function checkFill(unitId) {
  const unit = units.find(u => u.id === unitId);
  const card = document.getElementById(unitId);
  const dzs = card.querySelectorAll('.fill-area .dz');
  const answers = unit.fill.answers;
  let correct = 0;
  let total = answers.length;
  dzs.forEach((dz, i) => {
    if (dz.textContent === answers[i]) {
      dz.classList.add('correct');
      dz.classList.remove('wrong');
      correct++;
    } else if (dz.textContent !== '') {
      dz.classList.add('wrong');
      dz.classList.remove('correct');
    }
  });
  const result = card.querySelector(`#result-${unitId}`);
  const elapsed = getUnitTime(unitId);
  const allCorrect = (correct === total);
  if (allCorrect) {
    result.className = 'result show pass';
    result.innerHTML = `🎉 全問正解!(${correct}/${total}) <br>かかった時間:${formatTime(elapsed)}`;
    saveBestRecord(unitId, elapsed);
    confettiBurst();
    updateBestRecords(unitId);
  } else {
    result.className = 'result show fail';
    result.innerHTML = `${correct}/${total} 正解。間違えた箇所を見直してみましょう。`;
  }
}

function showFillAnswer(unitId) {
  const unit = units.find(u => u.id === unitId);
  const card = document.getElementById(unitId);
  const dzs = card.querySelectorAll('.fill-area .dz');
  // 既存配置を全部リセット
  dzs.forEach(dz => returnDz(unitId, dz));
  // 答えを順に置く
  dzs.forEach((dz, i) => {
    dz.textContent = unit.fill.answers[i];
    dz.classList.add('has-word');
    dz.classList.add('correct');
  });
  // バンクのチップを使用済みに(対応する単語を)
  unit.fill.answers.forEach(ans => {
    const chip = Array.from(card.querySelectorAll('.word-chip')).find(c =>
      c.dataset.word === ans && !c.classList.contains('used'));
    if (chip) chip.classList.add('used');
  });
  const result = card.querySelector(`#result-${unitId}`);
  result.className = 'result show pass';
  result.innerHTML = `💡 お手本を表示しました。じっくり読んでから、「🎯 自分で挑戦」を押して練習してみましょう。`;
  // ヒントメッセージを「お手本表示中」に
  const hint = document.getElementById(`fill-hint-${unitId}`);
  if (hint) hint.innerHTML = '📖 お手本表示中です。「🎯 自分で挑戦」を押すと、語句を外して練習できます。';
}

// 初期表示用:お手本を静かに表示(メッセージなし、結果欄に表示しない)
function fillInitialAnswers(card, unit) {
  const dzs = card.querySelectorAll('.fill-area .dz');
  dzs.forEach((dz, i) => {
    const ans = unit.fill.answers[i];
    if (ans === undefined) return;
    dz.textContent = ans;
    dz.classList.add('has-word');
    // 初期表示は「正解色」ではなく「埋まっている色」にしておく(お手本らしく)
  });
  // 対応するチップを使用済みに
  unit.fill.answers.forEach(ans => {
    const chip = Array.from(card.querySelectorAll('.word-chip')).find(c =>
      c.dataset.word === ans && !c.classList.contains('used'));
    if (chip) chip.classList.add('used');
  });
}

function resetFill(unitId) {
  const card = document.getElementById(unitId);
  card.querySelectorAll('.fill-area .dz').forEach(dz => returnDz(unitId, dz));
  card.querySelectorAll('.word-chip').forEach(c => {
    c.classList.remove('used', 'selected');
    c.style.boxShadow = '';
  });
  const result = card.querySelector(`#result-${unitId}`);
  result.classList.remove('show', 'pass', 'fail');
  // ヒントメッセージを「挑戦中」に切り替え
  const hint = document.getElementById(`fill-hint-${unitId}`);
  if (hint) hint.innerHTML = '🎯 挑戦中です。語句バンクから語句をドラッグ(またはタップして枠をクリック)で配置しましょう。';
  // 単元タイマー再スタート
  state.unitStartTime = state.unitStartTime || {};
  state.unitStartTime[unitId] = Date.now();
}

// =================================================================
// 単元ごとのタイマー(穴埋め用)
// =================================================================
function getUnitTime(unitId) {
  state.unitStartTime = state.unitStartTime || {};
  if (!state.unitStartTime[unitId]) state.unitStartTime[unitId] = Date.now();
  return Math.floor((Date.now() - state.unitStartTime[unitId]) / 1000);
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// =================================================================
// ベスト記録(localStorage)
// =================================================================
function saveBestRecord(unitId, sec) {
  const key = `joho4_best_${unitId}`;
  let arr = JSON.parse(localStorage.getItem(key) || '[]');
  arr.push({ sec, date: new Date().toISOString().slice(0,10) });
  arr.sort((a, b) => a.sec - b.sec);
  arr = arr.slice(0, 3);
  localStorage.setItem(key, JSON.stringify(arr));
}

function updateBestRecords(unitId) {
  const key = `joho4_best_${unitId}`;
  const arr = JSON.parse(localStorage.getItem(key) || '[]');
  const el = document.getElementById(`best-${unitId}`);
  if (!el) return;
  if (arr.length === 0) {
    el.innerHTML = `<strong>🏆 ベスト3</strong>:まだ記録がありません。穴埋めを全問正解してみましょう。`;
  } else {
    const list = arr.map((r, i) => `${['🥇','🥈','🥉'][i]} ${formatTime(r.sec)}`).join(' / ');
    el.innerHTML = `<strong>🏆 ベスト3</strong>:${list}`;
  }
}

// =================================================================
// 4択 / 確認モード(共通)
// =================================================================
function renderChoice4(unit) {
  return unit.choice4.map((q, qi) => renderChoiceQ(unit.id, 'choice4', q, qi)).join('');
}

function renderConfirm(unit) {
  return unit.confirm.map((q, qi) => renderChoiceQ(unit.id, 'confirm', q, qi)).join('');
}

function renderChoiceQ(unitId, mode, q, qi) {
  const opts = q.options.map((opt, oi) =>
    `<button class="q-option" data-unit="${unitId}" data-mode="${mode}" data-qi="${qi}" data-oi="${oi}">${escapeHtmlAllowBr(opt)}</button>`
  ).join('');
  // q.q: 問題文(プレーンテキスト) — escapeHtmlだが <br> を含む既存問題に配慮:そのまま出す
  // ただし code/flowchartがある場合はQに含めない
  const qText = (q.q || '').replace(/<br\s*\/?>/g, '<br>');  // <br>をそのまま
  // codeフィールド:DNCL風プログラム(縦1列で表示)
  const codeBlock = q.code ? `
    <div class="q-code-block">${q.code.split('\n').map(line => {
      // 既にHTMLタグ(<span>)が含まれている場合はそのまま、プレーンテキストならエスケープ
      if (line.includes('<span')) return line;
      return escapeHtml(line);
    }).join('<br>')}</div>
  ` : '';
  // flowchartフィールド:フローチャートSVG(ボタンで開閉)
  const flowchartBtn = q.flowchart ? `
    <button class="q-flowchart-toggle" type="button" data-target="fc-${unitId}-${mode}-${qi}">📊 フローチャート図を見る ▼</button>
    <div class="q-flowchart-content" id="fc-${unitId}-${mode}-${qi}" style="display:none;">${q.flowchart}</div>
  ` : '';
  return `
    <div class="q-item" data-unit="${unitId}" data-mode="${mode}" data-qi="${qi}">
      <div class="q-text">問${qi + 1}:${qText}</div>
      ${codeBlock}
      ${flowchartBtn}
      <div class="q-options">${opts}</div>
      <div class="q-feedback">
        <div><span class="label">💡 解説</span>${escapeHtml(q.exp || '')}</div>
        ${q.ex ? `<div style="margin-top:6px;"><span class="label">📝 例</span>${escapeHtml(q.ex)}</div>` : ''}
      </div>
    </div>
  `;
}

function initChoice(card, unit, mode) {
  const items = card.querySelectorAll(`.q-item[data-mode="${mode}"]`);
  items.forEach(item => {
    const qi = parseInt(item.dataset.qi);
    const q = unit[mode][qi];
    // フローチャート図ボタンの開閉
    const fcBtn = item.querySelector('.q-flowchart-toggle');
    if (fcBtn) {
      fcBtn.addEventListener('click', () => {
        const target = document.getElementById(fcBtn.dataset.target);
        if (target.style.display === 'none') {
          target.style.display = 'block';
          fcBtn.innerHTML = '📊 フローチャート図を閉じる ▲';
          fcBtn.classList.add('open');
        } else {
          target.style.display = 'none';
          fcBtn.innerHTML = '📊 フローチャート図を見る ▼';
          fcBtn.classList.remove('open');
        }
      });
    }
    item.querySelectorAll('.q-option').forEach(opt => {
      opt.addEventListener('click', () => {
        const oi = parseInt(opt.dataset.oi);
        // 全ボタン無効化
        item.querySelectorAll('.q-option').forEach(o => o.classList.add('disabled'));
        // 正解強調
        item.querySelectorAll('.q-option').forEach((o, idx) => {
          if (idx === q.answer) o.classList.add('correct');
        });
        // 不正解
        if (oi !== q.answer) opt.classList.add('wrong');
        // 解説表示
        item.querySelector('.q-feedback').classList.add('show');
        // 全問正解チェック
        setTimeout(() => checkAllCorrect(card, unit, mode), 300);
      });
    });
  });
}

// =================================================================
// チャレンジモード (ドラッグ&ドロップ語句バンク)
// =================================================================
function initChallenge(card, unit) {
  const list = unit.challenge || [];
  const bank = unit.challengeBank || [];
  if (!list.length) return;
  
  let html = '<div class="challenge-container">';
  html += '<div class="challenge-instruction">💡 下の語句バンクから正しい答えをドラッグ&ドロップしてください。</div>';
  
  // 問題一覧
  list.forEach((item, qi) => {
    html += `
    <div class="challenge-item" data-qi="${qi}">
      <div class="challenge-question">${qi + 1}. ${item.q}</div>
      <div class="challenge-dropzone" data-qi="${qi}" data-answer="${item.a}">
        <span class="challenge-placeholder">ここに答えをドロップ</span>
      </div>
      <div class="challenge-feedback" data-qi="${qi}"></div>
    </div>`;
  });
  
  // 語句バンク
  html += '<div class="challenge-bank-title">📚 語句バンク</div>';
  html += '<div class="challenge-bank">';
  
  // シャッフル
  const shuffled = [...bank].sort(() => Math.random() - 0.5);
  shuffled.forEach((word, wi) => {
    html += `<div class="challenge-chip" draggable="true" data-word="${word}">${word}</div>`;
  });
  
  html += '</div>';
  html += '<button class="challenge-check-btn" type="button">🎯 答え合わせ</button>';
  html += '<div class="challenge-result"></div>';
  html += '</div>';
  
  const container = card.querySelector('.mode-content[data-mode="challenge"]');
  container.innerHTML = html;
  
  // ドラッグ&ドロップイベント
  const chips = container.querySelectorAll('.challenge-chip');
  const dropzones = container.querySelectorAll('.challenge-dropzone');
  
  chips.forEach(chip => {
    chip.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', chip.dataset.word);
      chip.classList.add('dragging');
    });
    chip.addEventListener('dragend', () => {
      chip.classList.remove('dragging');
    });
  });
  
  dropzones.forEach(zone => {
    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      zone.classList.add('dragover');
    });
    zone.addEventListener('dragleave', () => {
      zone.classList.remove('dragover');
    });
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('dragover');
      
      const word = e.dataTransfer.getData('text/plain');
      zone.textContent = word;
      zone.dataset.userAnswer = word;
      zone.classList.add('filled');
      
      // フィードバックをクリア
      const qi = zone.dataset.qi;
      const feedback = container.querySelector(`.challenge-feedback[data-qi="${qi}"]`);
      feedback.textContent = '';
      feedback.className = 'challenge-feedback';
    });
  });
  
  // 答え合わせボタン
  container.querySelector('.challenge-check-btn').addEventListener('click', () => {
    let correct = 0;
    let total = list.length;
    
    dropzones.forEach((zone, qi) => {
      const userAnswer = zone.dataset.userAnswer || '';
      const correctAnswer = zone.dataset.answer;
      const feedback = container.querySelector(`.challenge-feedback[data-qi="${qi}"]`);
      
      if (userAnswer === correctAnswer) {
        zone.classList.add('correct');
        zone.classList.remove('wrong');
        feedback.textContent = '✅ 正解!';
        feedback.className = 'challenge-feedback correct';
        correct++;
      } else if (userAnswer) {
        zone.classList.add('wrong');
        zone.classList.remove('correct');
        feedback.textContent = `❌ 不正解。正解は「${correctAnswer}」です。`;
        feedback.className = 'challenge-feedback wrong';
      } else {
        feedback.textContent = '⚠️ 未回答です。';
        feedback.className = 'challenge-feedback';
      }
    });
    
    // 結果表示
    const result = container.querySelector('.challenge-result');
    const score = Math.round((correct / total) * 100);
    
    if (correct === total) {
      result.innerHTML = `<div class="all-correct">🎉 全問正解! おめでとうございます! (${correct}/${total})</div>`;
      confettiBurst();
    } else {
      result.innerHTML = `<div class="partial-correct">📊 正解数: ${correct}/${total} (${score}点)</div>`;
    }
    
    result.style.display = 'block';
  });
}

// =================================================================
// 全問正解チェック(各モード共通)
// =================================================================
function checkAllCorrect(card, unit, mode) {
  // ぜんぶの問題が解答済みかつ正解か?
  const items = card.querySelectorAll(`.q-item[data-mode="${mode}"]`);
  if (!items.length) return false;
  let answered = 0;
  let correct = 0;
  items.forEach((item, qi) => {
    const q = unit[mode][qi];
    if (mode === 'ox') {
      // 〇×は disabled になっていたら回答済み
      const btns = item.querySelectorAll('.ox-btn');
      const isDisabled = btns[0].disabled;
      if (isDisabled) {
        answered++;
        // 正解: wrongクラスがついたボタンが無いこと(=ユーザーは正解した)
        const userWrong = item.querySelector('.ox-btn.wrong');
        if (!userWrong) correct++;
      }
    } else {
      // 4択系
      const opts = item.querySelectorAll('.q-option');
      if (opts.length === 0) return;
      const isAnswered = opts[0].classList.contains('disabled');
      if (isAnswered) {
        answered++;
        const userWrong = item.querySelector('.q-option.wrong');
        if (!userWrong) correct++;
      }
    }
  });
  if (answered === items.length && correct === items.length) {
    // 全問正解!花吹雪+メッセージ
    showAllCorrectCelebration(card, unit, mode, correct);
    return true;
  }
  return false;
}

function showAllCorrectCelebration(card, unit, mode, total) {
  // 既にお祝い表示済みなら何もしない(連打防止)
  const content = card.querySelector(`.mode-content[data-mode="${mode}"]`);
  if (!content || content.querySelector('.all-correct-banner')) return;

  // バナーを挿入
  const modeLabel = {
    'choice4': '4択',
    'ox': '〇×',
    'confirm': '確認',
    'practice': '練習',
    'exercise': '演習'
  }[mode] || '';
  const banner = document.createElement('div');
  banner.className = 'all-correct-banner';
  banner.style.cssText = 'margin-top:16px; padding:18px 24px; background:linear-gradient(135deg,#FEF3C7,#FCE7F3); border:2px solid #F59E0B; border-radius:14px; text-align:center; box-shadow:0 4px 20px rgba(245,158,11,.25); font-size:1.05em; font-weight:700; color:#92400E;';
  banner.innerHTML = `🎉 全問正解!${modeLabel}モード ${total}問すべて正解しました! <span style="font-size:1.4em;">🎊✨</span>`;
  content.appendChild(banner);

  // 花吹雪
  confettiBurst();
}

function initPracticeOrExercise(card, unit, mode) {
  const list = unit[mode] || [];
  // 入力型の答え合わせボタン
  card.querySelectorAll(`.pe-check[data-mode="${mode}"]`).forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.qi);
      const q = list[qi];
      const item = card.querySelector(`.pe-item[data-mode="${mode}"][data-qi="${qi}"]`);
      const input = item.querySelector('.pe-input');
      const judge = item.querySelector('.pe-judge');
      const userVal = (input.value || '').trim().replace(/,/g, '').replace(/\s/g, '');
      const correctVal = String(q.answer).replace(/,/g, '');
      // 数値比較を許容(123 == 123.0など)
      let ok = (userVal === correctVal);
      if (!ok) {
        const a = parseFloat(userVal), b = parseFloat(correctVal);
        if (!isNaN(a) && !isNaN(b) && a === b) ok = true;
      }
      judge.style.display = 'block';
      if (ok) {
        judge.textContent = `🎉 正解!  答え:${q.answer} ${q.unit || ''}`;
        judge.style.color = '#065F46';
        input.style.borderColor = '#10B981';
        input.style.background = '#D1FAE5';
      } else {
        judge.textContent = `😢 残念。正しい答えは「${q.answer} ${q.unit || ''}」です。`;
        judge.style.color = '#991B1B';
        input.style.borderColor = '#EF4444';
        input.style.background = '#FEE2E2';
      }
      item.querySelector('.q-feedback').classList.add('show');
    });
  });
  // 入力型の「答えを見る」ボタン
  card.querySelectorAll(`.pe-show[data-mode="${mode}"]`).forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.qi);
      const q = list[qi];
      const item = card.querySelector(`.pe-item[data-mode="${mode}"][data-qi="${qi}"]`);
      const input = item.querySelector('.pe-input');
      const judge = item.querySelector('.pe-judge');
      input.value = String(q.answer);
      input.style.borderColor = '#F59E0B';
      input.style.background = '#FEF3C7';
      judge.style.display = 'block';
      judge.textContent = `💡 答え:${q.answer} ${q.unit || ''}`;
      judge.style.color = '#92400E';
      item.querySelector('.q-feedback').classList.add('show');
    });
  });
  // Enterキーで答え合わせ
  card.querySelectorAll(`.pe-input[data-mode="${mode}"]`).forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const qi = parseInt(inp.dataset.qi);
        const btn = card.querySelector(`.pe-check[data-mode="${mode}"][data-qi="${qi}"]`);
        if (btn) btn.click();
      }
    });
  });
  // 4択型(choice)の処理は initChoice と同じロジック
  card.querySelectorAll(`.pe-item[data-mode="${mode}"]`).forEach(item => {
    const qi = parseInt(item.dataset.qi);
    const q = list[qi];
    if (!q || q.type === 'input') return;
    item.querySelectorAll('.q-option').forEach(opt => {
      opt.addEventListener('click', () => {
        const oi = parseInt(opt.dataset.oi);
        item.querySelectorAll('.q-option').forEach(o => o.classList.add('disabled'));
        item.querySelectorAll('.q-option').forEach((o, idx) => {
          if (idx === q.answer) o.classList.add('correct');
        });
        if (oi !== q.answer) opt.classList.add('wrong');
        item.querySelector('.q-feedback').classList.add('show');
        // 全問正解チェック(練習・演習用)
        setTimeout(() => checkAllCorrectPE(card, unit, mode), 300);
      });
    });
  });
}

// 練習・演習用 全問正解チェック(pe-item セレクタを使う)
function checkAllCorrectPE(card, unit, mode) {
  const items = card.querySelectorAll(`.pe-item[data-mode="${mode}"]`);
  if (!items.length) return;
  let answered = 0, correct = 0;
  items.forEach((item, qi) => {
    const q = (unit[mode] || [])[qi];
    if (!q) return;
    if (q.type === 'input') {
      // input型: judgeが表示済みかつ green なら正解
      const judge = item.querySelector('.pe-judge');
      if (judge && judge.style.display === 'block') {
        answered++;
        if (judge.textContent.includes('正解')) correct++;
      }
    } else {
      const opts = item.querySelectorAll('.q-option');
      if (opts.length === 0) return;
      if (opts[0].classList.contains('disabled')) {
        answered++;
        if (!item.querySelector('.q-option.wrong')) correct++;
      }
    }
  });
  if (answered === items.length && correct === items.length) {
    showAllCorrectCelebration(card, unit, mode, correct);
  }
}

// =================================================================
// 花吹雪
// =================================================================
function confettiBurst() {
  const colors = ['#7C3AED', '#5B21B6', '#A78BFA', '#F59E0B', '#FBBF24', '#EC4899', '#10B981'];
  for (let i = 0; i < 80; i++) {
    const conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.background = colors[Math.floor(Math.random() * colors.length)];
    conf.style.left = Math.random() * 100 + 'vw';
    conf.style.top = '-20px';
    conf.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(conf);
    const duration = 2000 + Math.random() * 2000;
    const xMove = (Math.random() - 0.5) * 200;
    conf.animate([
      { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
      { transform: `translate(${xMove}px, ${window.innerHeight + 50}px) rotate(${720 + Math.random()*360}deg)`, opacity: 0 }
    ], { duration: duration, easing: 'cubic-bezier(0.2, 0.7, 0.4, 1.0)' });
    setTimeout(() => conf.remove(), duration);
  }
}

let timerIntervalId = null;

function tickTimer() {
  const sec = Math.floor((Date.now() - state.startTime) / 1000);
  document.getElementById('timer').textContent = '⏱️ ' + formatTime(sec);
}

function startGlobalTimer() {
  if (timerIntervalId) return; // 既に動作中なら何もしない
  state.startTime = Date.now();
  timerIntervalId = setInterval(tickTimer, 1000);
  tickTimer(); // 即座に表示を更新
}

function stopGlobalTimer() {
  if (timerIntervalId) {
    clearInterval(timerIntervalId);
    timerIntervalId = null;
  }
}

      const card = document.getElementById(hash);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        card.style.transition = 'box-shadow 0.4s';
        const orig = card.style.boxShadow;
        card.style.boxShadow = '0 0 0 4px #fbbf24, 0 8px 30px rgba(245,158,11,.4)';
        setTimeout(function(){ card.style.boxShadow = orig; }, 1800);
      }
    }, 120);
  }
});



// =================================================================
// 重要語句ポップアップ
// =================================================================
(function() {
  const popup = document.createElement('div');
  popup.className = 'term-popup';
  document.body.appendChild(popup);

  let currentTerm = null;

  document.addEventListener('click', (e) => {
    const term = e.target.closest('.term');
    if (term) {
      e.stopPropagation();
      const termKey = term.dataset.term;
      
      // 現在のカードのunit情報を取得
      const card = term.closest('.unit-card');
      if (!card) return;
      
      const unit = units.find(u => u.id === card.id);
      if (!unit || !unit.terms || !unit.terms[termKey]) return;
      
      const termData = unit.terms[termKey];
      
      // ポップアップ内容を生成
      popup.innerHTML = `
        <div class="term-popup-title">${termKey}</div>
        <div class="term-popup-en">${termData.en}</div>
        <div class="term-popup-kana">${termData.kana}</div>
        <div class="term-popup-origin">${termData.origin}</div>
      `;
      
      // 位置調整
      const rect = term.getBoundingClientRect();
      let top = rect.bottom + window.scrollY + 10;
      let left = rect.left + window.scrollX;
      
      // 画面外に出ないように調整
      popup.style.left = left + 'px';
      popup.style.top = top + 'px';
      popup.classList.add('show');
      
      // 画面下部はみ出し対策
      requestAnimationFrame(() => {
        const popupRect = popup.getBoundingClientRect();
        if (popupRect.bottom > window.innerHeight) {
          top = rect.top + window.scrollY - popupRect.height - 10;
          popup.style.top = top + 'px';
        }
        if (popupRect.right > window.innerWidth) {
          left = window.innerWidth - popupRect.width - 20;
          popup.style.left = left + 'px';
        }
      });
      
      currentTerm = term;
    } else if (!e.target.closest('.term-popup')) {
      popup.classList.remove('show');
      currentTerm = null;
    }
  });

  // スクロール時にポップアップを閉じる
  let scrollTimeout;
  window.addEventListener('scroll', () => {
    if (popup.classList.contains('show')) {
      popup.classList.remove('show');
      currentTerm = null;
    }
  }, { passive: true });
})();


// =================================================================
// インタラクティブ表（5大装置）
// =================================================================
let tableChallengeModeActive = false;

function toggleTableChallenge() {
  tableChallengeModeActive = !tableChallengeModeActive;
  const btn = document.querySelector('.btn-toggle-table-challenge');
  const checkBtn = document.querySelector('.btn-check-table');
  const wordBank = document.getElementById('table-word-bank');
  const result = document.getElementById('table-result');
  
  // ボタン表示切替
  btn.querySelector('.challenge-off').style.display = tableChallengeModeActive ? 'none' : 'inline';
  btn.querySelector('.challenge-on').style.display = tableChallengeModeActive ? 'inline' : 'none';
  checkBtn.style.display = tableChallengeModeActive ? 'inline-block' : 'none';
  wordBank.style.display = tableChallengeModeActive ? 'block' : 'none';
  result.style.display = 'none';
  
  // 全ての行を切り替え
  document.querySelectorAll('.table-dropzone').forEach(cell => {
    const answer = cell.querySelector('.table-answer');
    const dropArea = cell.querySelector('.table-drop-area');
    
    if (tableChallengeModeActive) {
      answer.style.display = 'none';
      dropArea.style.display = 'flex';
      dropArea.classList.remove('filled', 'correct', 'wrong');
      dropArea.innerHTML = '<span class="table-placeholder">ここにドロップ</span>';
      delete dropArea.dataset.userAnswer;
    } else {
      answer.style.display = 'block';
      dropArea.style.display = 'none';
    }
  });
  
  if (tableChallengeModeActive) {
    initTableDragDrop();
  }
}

function initTableDragDrop() {
  const chips = document.querySelectorAll('.table-chip');
  const dropzones = document.querySelectorAll('.table-drop-area');
  
  chips.forEach(chip => {
    chip.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', chip.dataset.word);
      chip.classList.add('dragging');
    });
    
    chip.addEventListener('dragend', () => {
      chip.classList.remove('dragging');
    });
  });
  
  dropzones.forEach(zone => {
    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      zone.classList.add('dragover');
    });
    
    zone.addEventListener('dragleave', () => {
      zone.classList.remove('dragover');
    });
    
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('dragover');
      
      const word = e.dataTransfer.getData('text/plain');
      zone.textContent = word;
      zone.dataset.userAnswer = word;
      zone.classList.add('filled');
      zone.classList.remove('correct', 'wrong');
    });
  });
}

function checkTableAnswers() {
  const dropzones = document.querySelectorAll('.table-drop-area');
  let correct = 0;
  let total = dropzones.length;
  
  dropzones.forEach(zone => {
    const userAnswer = zone.dataset.userAnswer || '';
    const correctAnswer = zone.parentElement.dataset.answer;
    
    if (userAnswer === correctAnswer) {
      zone.classList.add('correct');
      zone.classList.remove('wrong');
      correct++;
    } else if (userAnswer) {
      zone.classList.add('wrong');
      zone.classList.remove('correct');
    }
  });
  
  const result = document.getElementById('table-result');
  result.style.display = 'block';
  
  if (correct === total) {
    result.className = 'table-result all-correct';
    result.textContent = `🎉 全問正解! 5大装置をマスターしました! (${correct}/${total})`;
    confettiBurst();
  } else {
    result.className = 'table-result partial';
    result.textContent = `📊 正解数: ${correct}/${total} もう少し！`;
  }
}
