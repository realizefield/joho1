const PAGES = [{"title": "📄 ページ1(1〜2節+検索と論理演算)", "units": [0, 1, 2]}, {"title": "📄 ページ2(3〜5節)", "units": [3, 4, 5]}, {"title": "📄 ページ3(6〜8節)", "units": [6, 7, 8]}, {"title": "📄 ページ4(論理的文章構成+表現の工夫+9〜10節)", "units": [9, 10, 11, 12]}];
let currentPage = 0;
let unitStates = {};
let timerIntervals = {};

function initUnitState(unitId) {
  if (!unitStates[unitId]) {
    unitStates[unitId] = {
      mode: 'fill',
      challenge: { active: false, answers: [], blanks: [], parts: [], selectedWord: null, startTime: null, elapsed: 0, shuffledWords: null },
      records: [],
      quiz4: { idx: 0, score: 0, answered: false },
      ox: { idx: 0, score: 0, answered: false },
      quiz4check: { idx: 0, score: 0, answered: false }
    };
  }
  return unitStates[unitId];
}

function init() {
  renderPageTabs();
  // URLハッシュからジャンプ先を決定 (#unitN)
  let initialPage = 0;
  let targetUnitId = null;
  const hash = (location.hash || '').replace('#', '');
  if (hash) {
    for (let p = 0; p < PAGES.length; p++) {
      const found = PAGES[p].units.some(idx => ALL_UNITS[idx] && ALL_UNITS[idx].id === hash);
      if (found) { initialPage = p; targetUnitId = hash; break; }
    }
  }
  currentPage = initialPage;
  renderPageTabs();
  renderPage(initialPage);
  if (targetUnitId) {
    setTimeout(function() {
      const card = document.getElementById('card-' + targetUnitId);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        card.style.transition = 'box-shadow 0.4s';
        const orig = card.style.boxShadow;
        card.style.boxShadow = '0 0 0 4px #fbbf24, 0 8px 30px rgba(245,158,11,.4)';
        setTimeout(function(){ card.style.boxShadow = orig; }, 1800);
      }
    }, 100);
  }
}

window.addEventListener('hashchange', function() { init(); });


function renderPageTabs() {
  const container = document.getElementById('pageTabs');
  container.innerHTML = '';
  PAGES.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'page-tab' + (i === currentPage ? ' active' : '');
    btn.textContent = p.title;
    btn.onclick = () => switchPage(i);
    container.appendChild(btn);
  });
}

function switchPage(pageIdx) {
  Object.keys(timerIntervals).forEach(uid => { clearInterval(timerIntervals[uid]); delete timerIntervals[uid]; });
  currentPage = pageIdx;
  renderPageTabs();
  renderPage(pageIdx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPage(pageIdx) {
  const container = document.getElementById('unitsContainer');
  container.innerHTML = '';
  PAGES[pageIdx].units.forEach(unitIdx => {
    const unit = ALL_UNITS[unitIdx];
    initUnitState(unit.id);
    container.appendChild(createUnitCard(unit));
  });
}

function createUnitCard(unit) {
  const state = unitStates[unit.id];
  const card = document.createElement('div');
  card.className = 'unit-card';
  card.id = 'card-' + unit.id;
  card.innerHTML = '<h2 class="unit-title">' + unit.title + '</h2>' +
    '<div class="mode-tabs">' +
    '<button class="mode-tab active" data-mode="fill" data-uid="' + unit.id + '">✏️ 穴埋め</button>' +
    '<button class="mode-tab" data-mode="quiz4" data-uid="' + unit.id + '">🎯 4択練習</button>' +
    '<button class="mode-tab" data-mode="ox" data-uid="' + unit.id + '">⭕❌ 〇×</button>' +
    '<button class="mode-tab" data-mode="quiz4check" data-uid="' + unit.id + '">📝 確認4択</button>' +
    '</div><div class="mode-content" id="content-' + unit.id + '"></div>';
  card.querySelectorAll('.mode-tab').forEach(tab => {
    tab.onclick = () => {
      const uid = tab.dataset.uid;
      const mode = tab.dataset.mode;
      card.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.mode = mode;
      renderModeContent(uid);
    };
  });
  setTimeout(() => renderModeContent(unit.id), 0);
  return card;
}

function renderModeContent(unitId) {
  const state = unitStates[unitId];
  const container = document.getElementById('content-' + unitId);
  if (!container) return;
  if (state.mode === 'fill') renderFill(unitId, container);
  else if (state.mode === 'quiz4') renderQuiz(unitId, container, 'quiz4');
  else if (state.mode === 'ox') renderOx(unitId, container);
  else if (state.mode === 'quiz4check') renderQuiz(unitId, container, 'quiz4check');
}

function renderFill(unitId, container) {
  const state = unitStates[unitId];
  container.innerHTML =
    '<div class="timer-box">' +
    '<div>⏱️ <span class="timer-display" id="timer-' + unitId + '">' + formatTime(state.challenge.elapsed) + '</span></div>' +
    '<div class="records" id="records-' + unitId + '"></div>' +
    '<button class="btn btn-secondary" onclick="resetRecords(\' + unitId + \')">記録リセット</button>' +
    '</div>' +
    '<div class="btn-group">' +
    '<button class="btn btn-primary" onclick="startChallenge(\' + unitId + \')">🚀 チャレンジ</button>' +
    '<button class="btn btn-warning" onclick="showOhon(\' + unitId + \')">📖 お手本</button>' +
    '<button class="btn btn-success" onclick="resumeChallenge(\' + unitId + \')">▶️ 再開</button>' +
    '<button class="btn btn-danger" onclick="judge(\' + unitId + \')">✓ 判定</button>' +
    '</div>' +
    '<div id="message-' + unitId + '"></div>' + '<div id="extraInfo-' + unitId + '"></div>' +
    '<div class="passage" id="passage-' + unitId + '"></div>' +
    '<div class="word-bank">' +
    '<div class="word-bank-title" id="wordBankTitle-' + unitId + '">【語群】チャレンジボタンを押すと表示されます</div>' +
    '<div class="word-bank-words" id="wordBankWords-' + unitId + '"></div>' +
    '</div>';
  showOhon(unitId);
  renderRecords(unitId);
}

function parseFillText(text) {
  const blanks = [], parts = [];
  let lastIdx = 0;
  const regex = /\[([^\]]+)\]/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    parts.push({ type: 'text', content: text.substring(lastIdx, match.index) });
    parts.push({ type: 'blank', idx: blanks.length });
    blanks.push(match[1]);
    lastIdx = match.index + match[0].length;
  }
  parts.push({ type: 'text', content: text.substring(lastIdx) });
  return { parts, blanks };
}

// {漢字|ふりがな} を <ruby> に変換するヘルパー
function applyRuby(text) {
  return text.replace(/\{([^|}]+)\|([^}]+)\}/g, '<ruby>$1<rt>$2</rt></ruby>');
}

// テキストノードとしてrubyを含むHTMLを挿入するヘルパー
function appendWithRuby(parent, text) {
  const html = applyRuby(text);
  if (html === text) {
    parent.appendChild(document.createTextNode(text));
  } else {
    const span = document.createElement('span');
    span.innerHTML = html;
    parent.appendChild(span);
  }
}

function showOhon(unitId) {
  const unit = ALL_UNITS.find(u => u.id === unitId);
  const { parts, blanks } = parseFillText(unit.fill.text);
  const passage = document.getElementById('passage-' + unitId);
  if (!passage) return;
  passage.innerHTML = '';
  parts.forEach(p => {
    if (p.type === 'text') appendWithRuby(passage, p.content);
    else {
      const span = document.createElement('span');
      span.className = 'blank correct';
      const term = blanks[p.idx];
      span.textContent = term;
      // 語句解説があれば追加
      const gloss = unit.glossary && unit.glossary[term];
      if (gloss) {
        span.classList.add('has-glossary');
        const popup = document.createElement('span');
        popup.className = 'glossary-popup';
        let popupHTML = '';
        if (gloss.en) popupHTML += '<div><span class="term-en">' + gloss.en + '</span>';
        if (gloss.kana) popupHTML += ' <span class="term-kana">[' + gloss.kana + ']</span>';
        if (gloss.en) popupHTML += '</div>';
        popupHTML += '<div style="margin-top:4px;">' + gloss.desc + '</div>';
        popup.innerHTML = popupHTML;
        span.appendChild(popup);
        span.onclick = (e) => {
          e.stopPropagation();
          document.querySelectorAll('.glossary-popup.show').forEach(p => { if (p !== popup) p.classList.remove('show'); });
          popup.classList.toggle('show');
        };
        span.onmouseenter = () => popup.classList.add('show');
        span.onmouseleave = () => popup.classList.remove('show');
      }
      passage.appendChild(span);
    }
  });
  document.getElementById('wordBankWords-' + unitId).innerHTML = '';
  document.getElementById('wordBankTitle-' + unitId).textContent = '【語群】チャレンジボタンを押すと表示されます';
  showMessage(unitId, 'お手本を表示中です。緑の下線が引かれた語句にマウスを乗せる(またはタップする)と詳しい説明が表示されます。', 'info');
  renderExtraInfoIfPresent(unitId);
}

function startChallenge(unitId) {
  const state = unitStates[unitId];
  const unit = ALL_UNITS.find(u => u.id === unitId);
  const parsed = parseFillText(unit.fill.text);
  state.challenge.active = true;
  state.challenge.blanks = parsed.blanks;
  state.challenge.answers = new Array(parsed.blanks.length).fill(null);
  state.challenge.parts = parsed.parts;
  state.challenge.selectedWord = null;
  state.challenge.elapsed = 0;
  state.challenge.startTime = Date.now();
  state.challenge.shuffledWords = [...parsed.blanks].sort(() => Math.random() - 0.5);
  renderChallenge(unitId);
  startTimer(unitId);
  const exDiv = document.getElementById('extraInfo-' + unitId); if (exDiv) exDiv.innerHTML = '';
  showMessage(unitId, '語群から語句を選び、空欄をタップして埋めてください。', 'info');
}

function renderChallenge(unitId) {
  const state = unitStates[unitId];
  const ch = state.challenge;
  const passage = document.getElementById('passage-' + unitId);
  if (!passage) return;
  passage.innerHTML = '';
  ch.parts.forEach(p => {
    if (p.type === 'text') appendWithRuby(passage, p.content);
    else {
      const span = document.createElement('span');
      span.className = 'blank';
      const ans = ch.answers[p.idx];
      if (ans) { span.textContent = ans; span.classList.add('filled'); }
      else span.textContent = '?'.repeat(Math.min(ch.blanks[p.idx].length, 6));
      span.onclick = () => fillBlank(unitId, p.idx);
      passage.appendChild(span);
    }
  });
  const usedWords = ch.answers.filter(a => a !== null);
  const wordBankEl = document.getElementById('wordBankWords-' + unitId);
  wordBankEl.innerHTML = '';
  document.getElementById('wordBankTitle-' + unitId).textContent = '【語群】タップして選択してください';
  const usedCounts = {};
  usedWords.forEach(w => { usedCounts[w] = (usedCounts[w] || 0) + 1; });
  const tempUsed = {};
  ch.shuffledWords.forEach((word) => {
    tempUsed[word] = (tempUsed[word] || 0) + 1;
    const isUsed = tempUsed[word] <= (usedCounts[word] || 0);
    const chip = document.createElement('span');
    chip.className = 'word-chip' + (isUsed ? ' used' : '');
    if (ch.selectedWord === word && !isUsed) chip.classList.add('selected');
    chip.textContent = word;
    chip.onclick = () => selectWord(unitId, word, chip);
    wordBankEl.appendChild(chip);
  });
}

function selectWord(unitId, word, chip) {
  if (chip.classList.contains('used')) return;
  unitStates[unitId].challenge.selectedWord = word;
  const card = document.getElementById('card-' + unitId);
  card.querySelectorAll('.word-chip').forEach(c => c.classList.remove('selected'));
  chip.classList.add('selected');
}

function fillBlank(unitId, blankIdx) {
  const ch = unitStates[unitId].challenge;
  if (ch.selectedWord) {
    ch.answers[blankIdx] = ch.selectedWord;
    ch.selectedWord = null;
    renderChallenge(unitId);
  } else if (ch.answers[blankIdx]) {
    ch.answers[blankIdx] = null;
    renderChallenge(unitId);
  }
}

function judge(unitId) {
  const state = unitStates[unitId];
  const ch = state.challenge;
  if (!ch.active) { showMessage(unitId, 'まずチャレンジボタンを押してください。', 'warning'); return; }
  if (ch.answers.includes(null)) { showMessage(unitId, 'まだ空欄があります。すべての空欄を埋めてください。', 'warning'); return; }
  let allCorrect = true;
  const passage = document.getElementById('passage-' + unitId);
  const blankEls = passage.querySelectorAll('.blank');
  ch.answers.forEach((ans, i) => {
    const correct = ch.blanks[i];
    const el = blankEls[i];
    if (ans === correct) { el.classList.remove('filled', 'wrong'); el.classList.add('correct'); }
    else { el.classList.remove('filled', 'correct'); el.classList.add('wrong'); allCorrect = false; }
  });
  if (allCorrect) {
    stopTimer(unitId);
    ch.active = false;
    saveRecord(unitId, ch.elapsed);
    showMessage(unitId, '🎉 合格! タイム: ' + formatTime(ch.elapsed), 'success');
    confetti();
  } else {
    showMessage(unitId, 'おしい! もう一歩です。間違った語句が語群に戻ります。再挑戦してください。', 'warning');
    setTimeout(() => {
      ch.answers = ch.answers.map((ans, i) => ans === ch.blanks[i] ? ans : null);
      renderChallenge(unitId);
    }, 1500);
  }
}

function resumeChallenge(unitId) {
  const state = unitStates[unitId];
  const ch = state.challenge;
  if (!ch.blanks || ch.blanks.length === 0) { showMessage(unitId, '再開できる挑戦がありません。チャレンジボタンを押してください。', 'warning'); return; }
  ch.active = true;
  renderChallenge(unitId);
  startTimer(unitId);
  showMessage(unitId, 'やっていたところから再開します。', 'info');
}

function startTimer(unitId) {
  stopTimer(unitId);
  const state = unitStates[unitId];
  state.challenge.startTime = Date.now() - state.challenge.elapsed;
  timerIntervals[unitId] = setInterval(() => {
    state.challenge.elapsed = Date.now() - state.challenge.startTime;
    const el = document.getElementById('timer-' + unitId);
    if (el) el.textContent = formatTime(state.challenge.elapsed);
  }, 100);
}

function stopTimer(unitId) {
  if (timerIntervals[unitId]) { clearInterval(timerIntervals[unitId]); delete timerIntervals[unitId]; }
}

function formatTime(ms) {
  const sec = Math.floor(ms / 1000);
  const m = String(Math.floor(sec / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  return m + ':' + s;
}

function saveRecord(unitId, time) {
  const state = unitStates[unitId];
  state.records.push(time);
  state.records.sort((a, b) => a - b);
  state.records = state.records.slice(0, 3);
  renderRecords(unitId);
}

function renderRecords(unitId) {
  const state = unitStates[unitId];
  const container = document.getElementById('records-' + unitId);
  if (!container) return;
  container.innerHTML = '<span style="font-weight:bold;color:#92400e;">🏆ベスト3:</span>';
  if (state.records.length === 0) {
    container.innerHTML += '<span class="record-item">記録なし</span>';
  } else {
    state.records.forEach((r, i) => {
      const span = document.createElement('span');
      span.className = 'record-item';
      span.textContent = (i + 1) + '位 ' + formatTime(r);
      container.appendChild(span);
    });
  }
}

function resetRecords(unitId) {
  if (!confirm('この単元の記録をリセットしますか?')) return;
  const state = unitStates[unitId];
  state.records = [];
  state.challenge.elapsed = 0;
  const el = document.getElementById('timer-' + unitId);
  if (el) el.textContent = '00:00';
  renderRecords(unitId);
  showMessage(unitId, '記録をリセットしました。', 'info');
}

function showMessage(unitId, text, type) {
  const el = document.getElementById('message-' + unitId);
  if (!el) return;
  el.innerHTML = '<div class="message msg-' + type + '">' + text + '</div>';
  if (type !== 'success') {
    setTimeout(() => {
      const cur = el.querySelector('.msg-' + type);
      if (cur && cur.textContent === text) el.innerHTML = '';
    }, 4000);
  }
}

function confetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#ef4444', '#f59e0b', '#22c55e', '#3b82f6', '#a855f7', '#ec4899', '#fbbf24'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 0.5 + 's';
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    container.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

function renderQuiz(unitId, container, kind) {
  container.innerHTML =
    '<div class="progress"><div class="progress-bar" id="' + kind + '-progress-' + unitId + '" style="width:0%">0/0</div></div>' +
    '<div id="' + kind + '-container-' + unitId + '"></div>' +
    '<div class="btn-group">' +
    '<button class="btn btn-primary" onclick="nextQuiz(\' + unitId + \',\' + kind + \')">次の問題 ▶</button>' +
    '<button class="btn btn-secondary" onclick="resetQuiz(\' + unitId + \',\' + kind + \')">最初から</button>' +
    '</div>';
  renderQuizQuestion(unitId, kind);
}

function renderQuizQuestion(unitId, kind) {
  const state = unitStates[unitId];
  const unit = ALL_UNITS.find(u => u.id === unitId);
  const quizzes = unit[kind];
  const qs = state[kind];
  const c = document.getElementById(kind + '-container-' + unitId);
  const p = document.getElementById(kind + '-progress-' + unitId);
  if (!c || !p) return;
  if (qs.idx >= quizzes.length) {
    c.innerHTML = '<div class="message msg-success">🎉 すべて完了! 正解: ' + qs.score + '/' + quizzes.length + '</div>';
    p.style.width = '100%';
    p.textContent = quizzes.length + '/' + quizzes.length;
    return;
  }
  const q = quizzes[qs.idx];
  p.style.width = (qs.idx / quizzes.length * 100) + '%';
  p.textContent = qs.idx + '/' + quizzes.length;
  let html = '<div class="quiz-question">問' + (qs.idx + 1) + ': ' + q.q + '</div><div class="quiz-options">';
  q.opts.forEach((opt, i) => { html += '<button class="quiz-option" data-i="' + i + '">' + (i + 1) + '. ' + opt + '</button>'; });
  html += '</div>';
  c.innerHTML = html;
  c.querySelectorAll('.quiz-option').forEach(btn => {
    btn.onclick = () => answerQuiz(unitId, kind, parseInt(btn.dataset.i));
  });
}

function answerQuiz(unitId, kind, i) {
  const state = unitStates[unitId];
  const qs = state[kind];
  if (qs.answered) return;
  qs.answered = true;
  const unit = ALL_UNITS.find(u => u.id === unitId);
  const q = unit[kind][qs.idx];
  const opts = document.querySelectorAll('#' + kind + '-container-' + unitId + ' .quiz-option');
  opts.forEach((opt, idx) => {
    if (idx === q.a) opt.classList.add('correct');
    if (idx === i && i !== q.a) opt.classList.add('wrong');
    opt.disabled = true;
  });
  if (i === q.a) { qs.score++; confetti(); }
  // 解説を表示
  if (q.explain) {
    const c = document.getElementById(kind + '-container-' + unitId);
    const explainDiv = document.createElement('div');
    explainDiv.className = 'quiz-explain';
    let html = '<span class="ex-title">💡 解説</span>' + q.explain;
    if (q.example) html += '<span class="ex-example">📝 例:' + q.example + '</span>';
    explainDiv.innerHTML = html;
    c.appendChild(explainDiv);
  }
}

function nextQuiz(unitId, kind) {
  const state = unitStates[unitId];
  const unit = ALL_UNITS.find(u => u.id === unitId);
  if (!state[kind].answered && state[kind].idx < unit[kind].length) return;
  state[kind].idx++;
  state[kind].answered = false;
  renderQuizQuestion(unitId, kind);
}

function resetQuiz(unitId, kind) {
  unitStates[unitId][kind] = { idx: 0, score: 0, answered: false };
  renderQuizQuestion(unitId, kind);
}

function renderOx(unitId, container) {
  container.innerHTML =
    '<div class="progress"><div class="progress-bar" id="ox-progress-' + unitId + '" style="width:0%">0/0</div></div>' +
    '<div id="ox-container-' + unitId + '"></div>' +
    '<div class="btn-group">' +
    '<button class="btn btn-primary" onclick="nextOx(\' + unitId + \')">次の問題 ▶</button>' +
    '<button class="btn btn-secondary" onclick="resetOx(\' + unitId + \')">最初から</button>' +
    '</div>';
  renderOxQuestion(unitId);
}

function renderOxQuestion(unitId) {
  const state = unitStates[unitId];
  const unit = ALL_UNITS.find(u => u.id === unitId);
  const quizzes = unit.ox;
  const qs = state.ox;
  const c = document.getElementById('ox-container-' + unitId);
  const p = document.getElementById('ox-progress-' + unitId);
  if (!c || !p) return;
  if (qs.idx >= quizzes.length) {
    c.innerHTML = '<div class="message msg-success">🎉 すべて完了! 正解: ' + qs.score + '/' + quizzes.length + '</div>';
    p.style.width = '100%';
    p.textContent = quizzes.length + '/' + quizzes.length;
    return;
  }
  const q = quizzes[qs.idx];
  p.style.width = (qs.idx / quizzes.length * 100) + '%';
  p.textContent = qs.idx + '/' + quizzes.length;
  c.innerHTML =
    '<div class="quiz-question">問' + (qs.idx + 1) + ': ' + q.q + '</div>' +
    '<div class="ox-buttons">' +
    '<button class="ox-btn maru" data-v="true">○</button>' +
    '<button class="ox-btn batsu" data-v="false">×</button>' +
    '</div>' +
    '<div id="ox-result-' + unitId + '" style="margin-top:14px;"></div>';
  c.querySelectorAll('.ox-btn').forEach(btn => { btn.onclick = () => answerOx(unitId, btn.dataset.v === 'true'); });
}

function answerOx(unitId, val) {
  const state = unitStates[unitId];
  const qs = state.ox;
  if (qs.answered) return;
  qs.answered = true;
  const unit = ALL_UNITS.find(u => u.id === unitId);
  const q = unit.ox[qs.idx];
  const result = document.getElementById('ox-result-' + unitId);
  let html = '';
  if (val === q.a) {
    qs.score++;
    html = '<div class="message msg-success">✓ 正解! 答えは「' + (q.a ? '○' : '×') + '」です。</div>';
    confetti();
  } else {
    html = '<div class="message msg-warning">✗ 不正解。正解は「' + (q.a ? '○' : '×') + '」です。</div>';
  }
  // 解説を表示
  if (q.explain) {
    html += '<div class="quiz-explain"><span class="ex-title">💡 解説</span>' + q.explain;
    if (q.example) html += '<span class="ex-example">📝 例:' + q.example + '</span>';
    html += '</div>';
  }
  result.innerHTML = html;
}

function nextOx(unitId) {
  const state = unitStates[unitId];
  const unit = ALL_UNITS.find(u => u.id === unitId);
  if (!state.ox.answered && state.ox.idx < unit.ox.length) return;
  state.ox.idx++;
  state.ox.answered = false;
  renderOxQuestion(unitId);
}

function resetOx(unitId) {
  unitStates[unitId].ox = { idx: 0, score: 0, answered: false };
  renderOxQuestion(unitId);
}


function vennSvg(type) {
  const w = 70, h = 40, r = 14;
  const cx1 = 22, cx2 = 48, cy = 20;
  const FILL = '#86efac';
  const STROKE = '#15803d';
  // 一意IDを生成(同じページに複数SVGがあるため)
  const uid = 'v' + Math.random().toString(36).substr(2, 6);
  let body = '';
  
  if (type === 'AandB') {
    // 重なり部分のみ着色:Aの範囲でクリップしたBを描く
    body = '<defs><clipPath id="' + uid + '"><circle cx="' + cx1 + '" cy="' + cy + '" r="' + r + '"/></clipPath></defs>' +
           '<circle cx="' + cx2 + '" cy="' + cy + '" r="' + r + '" fill="' + FILL + '" clip-path="url(#' + uid + ')"/>';
  } else if (type === 'AorB') {
    // 両方の円を着色
    body = '<circle cx="' + cx1 + '" cy="' + cy + '" r="' + r + '" fill="' + FILL + '"/>' +
           '<circle cx="' + cx2 + '" cy="' + cy + '" r="' + r + '" fill="' + FILL + '"/>';
  } else if (type === 'notA') {
    // 全体を緑にして、Aの円を白で抜く
    body = '<mask id="' + uid + '"><rect x="0" y="0" width="' + w + '" height="' + h + '" fill="white"/>' +
           '<circle cx="' + cx1 + '" cy="' + cy + '" r="' + r + '" fill="black"/></mask>' +
           '<rect x="0" y="0" width="' + w + '" height="' + h + '" fill="' + FILL + '" mask="url(#' + uid + ')"/>';
  } else if (type === 'AandNotB') {
    // Aで塗ってBの部分を白で抜く
    body = '<mask id="' + uid + '"><rect x="0" y="0" width="' + w + '" height="' + h + '" fill="white"/>' +
           '<circle cx="' + cx2 + '" cy="' + cy + '" r="' + r + '" fill="black"/></mask>' +
           '<circle cx="' + cx1 + '" cy="' + cy + '" r="' + r + '" fill="' + FILL + '" mask="url(#' + uid + ')"/>';
  } else if (type === 'demorgan1') {
    // ¬(A∩B) = AとBの重なり以外すべて
    // 全体を緑 → A∩B(重なり)を白で抜く
    // 重なり部分はAかつBなので、Aの円形マスクの中でBの形だけを黒にする
    body = '<mask id="' + uid + '"><rect x="0" y="0" width="' + w + '" height="' + h + '" fill="white"/>' +
           '<circle cx="' + cx1 + '" cy="' + cy + '" r="' + r + '" fill="white"/>' +
           '<circle cx="' + cx2 + '" cy="' + cy + '" r="' + r + '" fill="white"/>' +
           '<g><circle cx="' + cx2 + '" cy="' + cy + '" r="' + r + '" fill="black" clip-path="url(#' + uid + 'clip)"/></g></mask>' +
           '<clipPath id="' + uid + 'clip"><circle cx="' + cx1 + '" cy="' + cy + '" r="' + r + '"/></clipPath>' +
           '<rect x="0" y="0" width="' + w + '" height="' + h + '" fill="' + FILL + '" mask="url(#' + uid + ')"/>';
  } else if (type === 'demorgan2') {
    // ¬(A∪B) = AにもBにも含まれない部分(両円の外側)
    body = '<mask id="' + uid + '"><rect x="0" y="0" width="' + w + '" height="' + h + '" fill="white"/>' +
           '<circle cx="' + cx1 + '" cy="' + cy + '" r="' + r + '" fill="black"/>' +
           '<circle cx="' + cx2 + '" cy="' + cy + '" r="' + r + '" fill="black"/></mask>' +
           '<rect x="0" y="0" width="' + w + '" height="' + h + '" fill="' + FILL + '" mask="url(#' + uid + ')"/>';
  }
  
  // 円の輪郭線とラベル(常に上に重ねる)
  const outlines = '<circle cx="' + cx1 + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + STROKE + '" stroke-width="1.3"/>' +
                   '<circle cx="' + cx2 + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + STROKE + '" stroke-width="1.3"/>';
  const labels = '<text x="' + (cx1 - r + 4) + '" y="' + (cy - r + 8) + '" font-size="9" fill="' + STROKE + '" font-weight="bold">A</text>' +
                 '<text x="' + (cx2 + r - 8) + '" y="' + (cy - r + 8) + '" font-size="9" fill="' + STROKE + '" font-weight="bold">B</text>';
  
  return '<svg class="venn-svg" width="56" height="36" viewBox="0 0 ' + w + ' ' + h + '" xmlns="http://www.w3.org/2000/svg">' +
         '<rect x="0" y="0" width="' + w + '" height="' + h + '" fill="#f8fafc" stroke="#94a3b8" stroke-width="0.5"/>' +
         body + outlines + labels + '</svg>';
}

function renderExtraInfoIfPresent(unitId) {
  const container = document.getElementById('extraInfo-' + unitId);
  if (!container) return;
  const unit = ALL_UNITS.find(u => u.id === unitId);
  if (!unit || !unit.extraInfo) { container.innerHTML = ''; return; }
  const ei = unit.extraInfo;
  let html = '<div class="extra-info-section"><div class="extra-info-title">' + ei.title + '</div>';
  html += '<table class="extra-table"><thead><tr>';
  html += '<th>意味</th><th>ベン図</th><th>集合記号</th><th>論理演算記号</th><th>用途</th>';
  html += '</tr></thead><tbody>';
  ei.rows.forEach(r => {
    html += '<tr>';
    html += '<td class="label-cell">' + r.set_name + '</td>';
    html += '<td class="venn-cell">' + vennSvg(r.venn) + '</td>';
    html += '<td class="symbol-cell">' + r.set_symbol + '</td>';
    html += '<td class="symbol-cell">' + r.logic + '</td>';
    html += '<td class="desc-cell">' + r.desc + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  container.innerHTML = html;
}

init();
</script>
</body>
</html>
