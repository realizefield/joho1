<!DOCTYPE html>
<html lang="ja">

<meta charset="UTF-8">

<title>情報1 学習単元表</title>
<style>
:root{
  /* テック風テーマ:濃紺×シアン×水色 */
  --ink:#0f172a;--ink2:#1e293b;
  --paper:#f1f5f9;
  --card:#ffffff;
  --primary:#0ea5e9;     /* スカイブルー */
  --primary-dark:#0369a1;
  --primary-light:#e0f2fe;
  --cyan:#06b6d4;
  --teal:#14b8a6;
  --accent:#22d3ee;      /* シアン光彩 */
  --gold:#f59e0b;
  --gold2:#fbbf24;
  --muted:#64748b;
  --border:#cbd5e1;
  --A:#10b981;--B:#3b82f6;--C:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Yu Gothic','BIZ UDGothic','Meiryo',sans-serif;
  background:linear-gradient(135deg,#f8fafc 0%,#e0f2fe 100%);
  color:var(--ink);font-size:15px;min-height:100vh
}

/* ━━━ ヘッダー ━━━ */
.hdr{
  background:linear-gradient(135deg,var(--ink) 0%,var(--ink2) 50%,#1e3a8a 100%);
  color:#fff;padding:0 20px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 20px rgba(2,132,199,.3);
  border-bottom:2px solid var(--accent);position:relative;overflow:hidden
}
.hdr::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 20% 50%,rgba(34,211,238,.15) 0%,transparent 50%);
  pointer-events:none
}
.hdr-left h1{font-size:1.15em;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:8px}
.hdr-left h1 .pulse{font-size:1.2em}
.hdr-left p{font-size:.7em;opacity:.65;letter-spacing:.12em;margin-top:2px;color:var(--accent)}
.streak-badge{
  display:flex;align-items:center;gap:8px;
  background:rgba(34,211,238,.12);
  border:1px solid rgba(34,211,238,.4);
  border-radius:24px;padding:7px 16px;
  backdrop-filter:blur(10px)
}
.streak-badge .flame{font-size:1.3em}
.streak-badge .days{font-size:.82em;font-weight:700;color:var(--gold2)}

/* ━━━ サマリーバー ━━━ */
.summary-bar{
  background:linear-gradient(135deg,#1e293b 0%,#0c4a6e 100%);
  padding:14px 20px;display:flex;gap:24px;align-items:center;flex-wrap:wrap;
  border-bottom:1px solid rgba(34,211,238,.3)
}
.sbar-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.sbar-num{font-size:1.5em;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;text-shadow:0 0 12px rgba(34,211,238,.4)}
.sbar-lbl{font-size:.68em;color:rgba(255,255,255,.7);letter-spacing:.06em}
.sbar-div{width:1px;background:rgba(255,255,255,.2);height:36px;margin:0 4px}
.progress-wrap{flex:1;min-width:220px}
.progress-lbl{font-size:.7em;color:rgba(255,255,255,.7);margin-bottom:5px}
.progress-bar{background:rgba(255,255,255,.12);border-radius:20px;height:12px;overflow:hidden;border:1px solid rgba(34,211,238,.2)}
.progress-fill{
  background:linear-gradient(90deg,var(--cyan),var(--accent),var(--gold2));
  height:100%;border-radius:20px;transition:.6s;
  box-shadow:0 0 10px rgba(34,211,238,.5)
}
.progress-pct{font-size:.78em;color:var(--accent);margin-top:4px;font-weight:700}

/* ━━━ メイン ━━━ */
.main{max-width:980px;margin:24px auto;padding:0 14px 60px}

/* ━━━ 達成バッジエリア ━━━ */
.badge-section{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:18px 22px;margin-bottom:22px;
  box-shadow:0 2px 12px rgba(2,132,199,.08);
  border-left:5px solid var(--accent)
}
.badge-title{font-size:.85em;font-weight:700;color:var(--ink2);letter-spacing:.08em;margin-bottom:14px}
.badges{display:flex;flex-wrap:wrap;gap:10px}
.badge{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:11px 14px;border-radius:10px;
  border:2px solid var(--border);background:#f8fafc;
  min-width:84px;transition:.25s
}
.badge.earned{
  border-color:var(--gold);
  background:linear-gradient(135deg,#fffbeb,#fef3c7);
  box-shadow:0 4px 14px rgba(245,158,11,.25)
}
.badge.locked{opacity:.32;filter:grayscale(.8)}
.badge-icon{font-size:1.8em}
.badge-name{font-size:.7em;font-weight:700;color:var(--ink);text-align:center;line-height:1.3}

/* ━━━ 連続学習カレンダー ━━━ */
.cal-section{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:18px 22px;margin-bottom:24px;
  box-shadow:0 2px 12px rgba(2,132,199,.08);
  border-left:5px solid var(--cyan)
}
.cal-title{font-size:.85em;font-weight:700;color:var(--ink2);letter-spacing:.08em;margin-bottom:12px}
.cal-grid{display:flex;flex-wrap:wrap;gap:4px}
.cal-day{width:16px;height:16px;border-radius:3px;background:var(--border)}
.cal-day.s1{background:#bae6fd}
.cal-day.s2{background:#7dd3fc}
.cal-day.s3{background:#0ea5e9}
.cal-day.s4{background:#0369a1}
.cal-lbl{display:flex;gap:6px;align-items:center;margin-top:10px;font-size:.72em;color:var(--muted)}
.cal-lbl-dot{width:12px;height:12px;border-radius:2px}

/* ━━━ 大カテゴリ(章) ━━━ */
.cat-section{margin-bottom:34px}
.cat-header{
  display:flex;align-items:center;gap:14px;margin-bottom:14px;
  padding:14px 18px;
  background:var(--card);border-radius:12px;
  box-shadow:0 2px 10px rgba(2,132,199,.08);
  border:1px solid var(--border)
}
.cat-bar{width:6px;border-radius:4px;height:36px;flex-shrink:0}
.cat-icon{font-size:1.5em}
.cat-title-wrap{flex:1}
.cat-title{font-size:1.15em;font-weight:700;letter-spacing:.04em;color:var(--ink)}
.cat-sub{font-size:.7em;letter-spacing:.14em;color:var(--muted);margin-top:2px;font-family:'Courier New',monospace}
.cat-count{font-size:.78em;color:var(--muted);font-weight:700;background:#f1f5f9;padding:6px 14px;border-radius:14px}

/* ━━━ 単元カード ━━━ */
.unit-card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  margin-bottom:9px;overflow:hidden;
  box-shadow:0 1px 4px rgba(2,132,199,.05);
  transition:.18s
}
.unit-card:hover{
  box-shadow:0 4px 18px rgba(14,165,233,.15);
  transform:translateY(-1px);
  border-color:var(--primary)
}
.unit-top{display:flex;align-items:center;gap:12px;padding:13px 16px}
.unit-num{
  width:32px;height:32px;border-radius:50%;
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.85em;flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.15)
}
.unit-title{flex:1;font-size:.95em;font-weight:700;line-height:1.4;color:var(--ink)}
.unit-type{
  font-size:.68em;padding:3px 9px;border-radius:10px;font-weight:700;
  flex-shrink:0;letter-spacing:.04em
}
.type-main{background:#dbeafe;color:#1e40af}

/* 理解度 ABC */
.abc-row{display:flex;gap:6px;padding:0 16px 12px;align-items:center}
.abc-lbl{font-size:.74em;color:var(--muted);font-weight:700;margin-right:4px;letter-spacing:.06em}
.abc-btn{
  width:36px;height:30px;border:2px solid var(--border);border-radius:7px;
  font-family:inherit;font-weight:700;font-size:.85em;
  background:#f8fafc;color:var(--muted);cursor:pointer;transition:.15s;flex-shrink:0
}
.abc-btn:hover{border-color:var(--primary)}
.abc-btn.A{background:var(--A);color:#fff;border-color:var(--A);box-shadow:0 2px 6px rgba(16,185,129,.4)}
.abc-btn.B{background:var(--B);color:#fff;border-color:var(--B);box-shadow:0 2px 6px rgba(59,130,246,.4)}
.abc-btn.C{background:var(--C);color:#fff;border-color:var(--C);box-shadow:0 2px 6px rgba(245,158,11,.4)}

/* 学習回数・最終日 */
.stat-row{display:flex;gap:14px;padding:0 16px 10px;align-items:center;flex-wrap:wrap}
.stat-item{display:flex;align-items:center;gap:4px;font-size:.78em;color:var(--muted)}
.stat-item .val{font-weight:700;color:var(--ink)}
.repeat-dots{display:flex;gap:3px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--border)}
.dot.done{background:var(--gold)}
.dot.done.perfect{background:var(--A)}

/* リンク行 */
.link-row{display:flex;gap:8px;padding:0 16px 14px;flex-wrap:wrap}
.page-link{
  text-decoration:none;font-family:inherit;font-size:.82em;font-weight:700;
  padding:7px 16px;border-radius:7px;
  border:1.5px solid var(--border);color:var(--ink);background:#f8fafc;
  transition:.15s;display:flex;align-items:center;gap:5px
}
.page-link:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-link.main-link{
  background:linear-gradient(135deg,var(--primary),var(--cyan));color:#fff;
  border-color:var(--primary-dark);
  box-shadow:0 2px 8px rgba(14,165,233,.3)
}
.page-link.main-link:hover{
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  box-shadow:0 4px 12px rgba(14,165,233,.4)
}

/* ━━━ モーダル(達成!) ━━━ */
.achieve-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;align-items:center;justify-content:center}
.achieve-modal.open{display:flex}
.achieve-box{
  background:#fff;border-radius:18px;padding:36px 40px;
  text-align:center;max-width:380px;width:90%;
  box-shadow:0 12px 48px rgba(0,0,0,.3);
  position:relative;overflow:hidden
}
.achieve-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,var(--cyan),var(--accent),var(--gold2),var(--cyan))
}
.achieve-emoji{font-size:3.2em;margin-bottom:10px}
.achieve-title{font-size:1.3em;font-weight:700;margin-bottom:8px;color:var(--ink)}
.achieve-sub{font-size:.9em;color:var(--muted);margin-bottom:20px;line-height:1.6}
.achieve-close{
  font-family:inherit;font-size:.9em;font-weight:700;
  background:linear-gradient(135deg,var(--primary),var(--cyan));color:#fff;
  border:none;border-radius:8px;padding:10px 30px;cursor:pointer;
  box-shadow:0 4px 12px rgba(14,165,233,.4)
}

#cnv{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}

/* レスポンシブ */
@media (max-width:640px){
  .hdr{height:auto;padding:10px 14px;flex-direction:column;gap:8px;align-items:flex-start}
  .hdr-left h1{font-size:1em}
  .summary-bar{padding:12px 14px;gap:14px}
  .sbar-num{font-size:1.2em}
  .progress-wrap{min-width:100%}
  .main{padding:0 10px 50px}
  .cat-header{padding:12px 14px}
  .unit-top{padding:11px 12px}
  .link-row{padding:0 12px 12px}
  .abc-row,.stat-row{padding-left:12px;padding-right:12px}
}
</style>
</head>

const ALL_UNIT_IDS = CHAPTERS.flatMap(c => c.units.map(u => u.id));

/* ━━━ バッジ定義 ━━━ */
const BADGES = [
  {id:'first',    icon:'🌱', name:'はじめの一歩', cond: d => getTotalCount(d) >= 1},
  {id:'study5',   icon:'📚', name:'5回学習',     cond: d => getTotalCount(d) >= 5},
  {id:'study20',  icon:'🏃', name:'20回学習',    cond: d => getTotalCount(d) >= 20},
  {id:'study50',  icon:'💪', name:'50回学習',    cond: d => getTotalCount(d) >= 50},
  {id:'half',     icon:'🎯', name:'半数チェック', cond: d => ALL_UNIT_IDS.filter(id => getGrade(d,id)).length >= Math.ceil(ALL_UNIT_IDS.length / 2)},
  {id:'allC',     icon:'🗒️', name:'全単元チェック', cond: d => ALL_UNIT_IDS.every(id => getGrade(d,id))},
  {id:'allB',     icon:'⭐', name:'全単元B以上',   cond: d => ALL_UNIT_IDS.every(id => ['A','B'].includes(getGrade(d,id)))},
  {id:'allA',     icon:'👑', name:'全単元A達成',   cond: d => ALL_UNIT_IDS.every(id => getGrade(d,id)==='A')},
  {id:'streak3',  icon:'🔥', name:'3日連続',       cond: d => getStreak() >= 3},
  {id:'streak7',  icon:'🌟', name:'7日連続',       cond: d => getStreak() >= 7},
  {id:'streak30', icon:'🏆', name:'30日連続',      cond: d => getStreak() >= 30},
];

/* ━━━ localStorage キー ━━━ */
const LS_KEY = 'joho_index_v1';
const LS_CAL = 'joho_calendar_v1';
const LS_BADGE = 'joho_badges_v1';

function loadData(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); }catch(e){ return {}; } }
function saveData(d){ localStorage.setItem(LS_KEY, JSON.stringify(d)); }

function getGrade(d,id){ return d[id+'_grade']||''; }
function getCount(d,id){ return d[id+'_count']||0; }
function getLast(d,id){  return d[id+'_last']||''; }
function getTotalCount(d){ return ALL_UNIT_IDS.reduce((s,id)=>s+getCount(d,id),0); }

/* ━━━ 連続学習日数 ━━━ */
function getTodayStr(){ return new Date().toISOString().slice(0,10); }
function getStreak(){
  const cal = JSON.parse(localStorage.getItem(LS_CAL)||'{}');
  let streak=0, dd=new Date();
  for(let i=0;i<365;i++){
    const k=dd.toISOString().slice(0,10);
    if(cal[k]) streak++;
    else if(i>0) break;
    dd.setDate(dd.getDate()-1);
  }
  return streak;
}
function markToday(){
  const cal = JSON.parse(localStorage.getItem(LS_CAL)||'{}');
  cal[getTodayStr()]=(cal[getTodayStr()]||0)+1;
  localStorage.setItem(LS_CAL, JSON.stringify(cal));
}

/* ━━━ 理解度セット ━━━ */
function setGrade(btn){
  const id=btn.dataset.id, grade=btn.dataset.grade;
  const d=loadData();
  const prev=getGrade(d,id);
  if(prev===grade){ d[id+'_grade']=''; }
  else { d[id+'_grade']=grade; }
  d[id+'_count']=(getCount(d,id)||0)+1;
  d[id+'_last']=getTodayStr();
  saveData(d);
  markToday();
  render();
  checkBadges(d);
}

/* ━━━ 章・単元カードのレンダリング ━━━ */
function buildChapters(){
  const wrap = document.getElementById('chaptersWrap');
  wrap.innerHTML = CHAPTERS.map(ch => `
    <div class="cat-section">
      <div class="cat-header" style="border-left:5px solid ${ch.color}">
        <div class="cat-bar" style="background:${ch.color}"></div>
        <div class="cat-icon">${ch.icon}</div>
        <div class="cat-title-wrap">
          <div class="cat-title">第${ch.no}章 ${ch.title}</div>
          <div class="cat-sub">${ch.subtitle}</div>
        </div>
        <div class="cat-count" id="cnt-${ch.id}">0/${ch.units.length}単元</div>
      </div>
      ${ch.units.map(u => `
        <div class="unit-card" id="uc-${u.id}">
          <div class="unit-top">
            <div class="unit-num" style="background:${ch.color}">${u.num}</div>
            <div class="unit-title">${u.title}</div>
            <span class="unit-type type-main">単元</span>
          </div>
          <div class="abc-row">
            <span class="abc-lbl">理解度</span>
            <button class="abc-btn" data-id="${u.id}" data-grade="A" onclick="setGrade(this)">A</button>
            <button class="abc-btn" data-id="${u.id}" data-grade="B" onclick="setGrade(this)">B</button>
            <button class="abc-btn" data-id="${u.id}" data-grade="C" onclick="setGrade(this)">C</button>
          </div>
          <div class="stat-row">
            <div class="stat-item">学習回数:<span class="val" id="cnt-u-${u.id}">0</span>回</div>
            <div class="repeat-dots" id="dots-${u.id}"></div>
            <div class="stat-item">最終:<span class="val" id="last-${u.id}">—</span></div>
          </div>
          <div class="link-row">
            <a class="page-link main-link" href="${u.main}">📖 単元を開く</a>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

/* ━━━ 繰り返しドット ━━━ */
function renderDots(id, cnt, grade){
  const el=document.getElementById('dots-'+id);
  if(!el) return;
  const max=7;
  let html='';
  for(let i=0;i<max;i++){
    const done=i<cnt;
    const cls=done?(grade==='A'?'done perfect':'done'):'';
    html+=`<div class="dot ${cls}"></div>`;
  }
  if(cnt>max) html+=`<span style="font-size:.7em;color:var(--muted);margin-left:2px">+${cnt-max}</span>`;
  el.innerHTML=html;
}

/* ━━━ 全体レンダリング ━━━ */
function render(){
  const d=loadData();
  let cntA=0,cntB=0,cntC=0,total=0;

  ALL_UNIT_IDS.forEach(id=>{
    const grade=getGrade(d,id);
    const cnt=getCount(d,id);
    const last=getLast(d,id);
    total+=cnt;
    if(grade==='A') cntA++;
    else if(grade==='B') cntB++;
    else if(grade==='C') cntC++;

    document.querySelectorAll(`[data-id="${id}"]`).forEach(btn=>{
      btn.className='abc-btn'+(grade===btn.dataset.grade?' '+grade:'');
    });

    const ce=document.getElementById('cnt-u-'+id);
    if(ce) ce.textContent=cnt;
    renderDots(id,cnt,grade);
    const le=document.getElementById('last-'+id);
    if(le) le.textContent=last||'—';

    const card=document.getElementById('uc-'+id);
    if(card){
      card.style.borderLeft=grade?`4px solid var(--${grade})`:'';
    }
  });

  document.getElementById('sumTotal').textContent=total;
  document.getElementById('sumA').textContent=cntA;
  document.getElementById('sumB').textContent=cntB;
  document.getElementById('sumC').textContent=cntC;

  const pct = Math.round(
    ALL_UNIT_IDS.reduce((s,id)=>{
      const g=getGrade(d,id);
      return s+(g==='A'?100:g==='B'?60:g==='C'?30:0);
    },0)/ALL_UNIT_IDS.length
  );
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';

  // 章別カウント
  CHAPTERS.forEach(ch => {
    const checked = ch.units.filter(u => getGrade(d,u.id)).length;
    const el = document.getElementById('cnt-'+ch.id);
    if(el) el.textContent = `${checked}/${ch.units.length}単元`;
  });

  document.getElementById('streakDisp').textContent=getStreak()+'日連続';
  renderBadges(d);
  renderCalendar();
}

/* ━━━ バッジレンダリング ━━━ */
function renderBadges(d){
  const area=document.getElementById('badgeArea');
  area.innerHTML=BADGES.map(b=>{
    const earned=b.cond(d);
    return `<div class="badge ${earned?'earned':'locked'}" title="${b.name}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
    </div>`;
  }).join('');
}

/* ━━━ バッジ取得チェック ━━━ */
function checkBadges(d){
  const prev=JSON.parse(localStorage.getItem(LS_BADGE)||'[]');
  BADGES.forEach(b=>{
    if(!prev.includes(b.id) && b.cond(d)){
      prev.push(b.id);
      localStorage.setItem(LS_BADGE,JSON.stringify(prev));
      showAchieve(b.icon, b.name+'を獲得!', 'おめでとうございます!🎊');
    }
  });
}

/* ━━━ カレンダーレンダリング ━━━ */
function renderCalendar(){
  const cal=JSON.parse(localStorage.getItem(LS_CAL)||'{}');
  const grid=document.getElementById('calGrid');
  let html='';
  for(let i=83;i>=0;i--){
    const dt=new Date(); dt.setDate(dt.getDate()-i);
    const k=dt.toISOString().slice(0,10);
    const v=cal[k]||0;
    const cls=v>=4?'s4':v>=3?'s3':v>=2?'s2':v>=1?'s1':'';
    html+=`<div class="cal-day ${cls}" title="${k}:${v}回"></div>`;
  }
  grid.innerHTML=html;
}

/* ━━━ 達成モーダル ━━━ */
function showAchieve(emoji, title, sub){
  document.getElementById('achieveEmoji').textContent=emoji;
  document.getElementById('achieveTitle').textContent=title;
  document.getElementById('achieveSub').textContent=sub;
  document.getElementById('achieveModal').classList.add('open');
  startConf();
  setTimeout(()=>{ stopConf(); }, 4000);
}
function closeAchieve(){
  document.getElementById('achieveModal').classList.remove('open');
  stopConf();
}

/* ━━━ 紙吹雪 ━━━ */
const cv=document.getElementById('cnv'),cx=cv.getContext('2d');
let pts=[],raf=null;
function startConf(){
  cv.width=innerWidth;cv.height=innerHeight;pts=[];
  for(let i=0;i<220;i++)pts.push({x:Math.random()*cv.width,y:Math.random()*cv.height-cv.height,s:Math.random()*10+4,c:`hsl(${180+Math.random()*60},70%,${55+Math.random()*15}%)`,sp:Math.random()*3+2,r:Math.random()*Math.PI*2,dr:.05});
  af();
}
function af(){
  cx.clearRect(0,0,cv.width,cv.height);
  pts.forEach(p=>{p.y+=p.sp;p.r+=p.dr;cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.fillStyle=p.c;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s);cx.restore();if(p.y>cv.height)p.y=-20;});
  raf=requestAnimationFrame(af);
}
function stopConf(){if(raf){cancelAnimationFrame(raf);raf=null;}cx.clearRect(0,0,cv.width,cv.height);pts=[];}

/* ━━━ 初期化 ━━━ */
buildChapters();
render();
</script>
